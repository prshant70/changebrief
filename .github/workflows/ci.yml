name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  tests:
    name: tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests (coverage >= 70%)
        run: |
          # Coverage gate focuses on the ai-context pipeline (primary user-facing feature).
          pytest -q \
            --cov=changebrief.core.ai_context \
            --cov=changebrief.commands.ai_context \
            --cov-report=term-missing \
            --cov-fail-under=70

